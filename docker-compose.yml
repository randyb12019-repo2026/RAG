services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    restart: on-failure

  streamlit:
    build: .
    ports:
      - "7860:7860"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: on-failure
